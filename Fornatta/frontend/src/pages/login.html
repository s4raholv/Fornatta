<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- O nome do css está alterado -->
    <!-- Caminho atualizado para a nova estrutura do projeto. -->
    <link rel="stylesheet" href="../LoginScreen.css">

</head>

<body>

    <div class="container">
        <div class="form-box login">
            <form action="">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Usuário"
                        required>
                        <i class='bx bxs-user'></i>
                    </div>
                     <div class="input-box">
                        <input type="password" placeholder="Senha"
                        required>
                       <i class='bx bxs-lock-alt'></i>
                    </div>
                    <div class="forgot-link">
                        <a href="#">Esqueceu a senha?</a>
                    </div>
                    <button type="submit" class="btn">Login</button>
                    <p>ou faça login com plataformas sociais</p>
                    <div class="social-icons">
                        <!-- adicionei funcionalidade para os botões da tela de login. -->
                        <!-- Precisa estar no navegador, não no preview do VScode. -->
                        <a href="https://accounts.google.com" target="_blank"><i class='bx bxl-google' ></i></a>
                        <a href="https://www.facebook.com" target="_blank"><i class='bx bxl-facebook' ></i></a>
                        <a href="https://github.com/login" target="_blank"><i class='bx bxl-github' ></i></a>
                        <a href="https://www.linkedin.com/login" target="_blank"><i class='bx bxl-linkedin' ></i></a>

                    </div>
                    
            </form>
        </div>

        <div class="form-box register">
            <form action=""> 
                <h1>Registro</h1>
                <div class="input-box">
                    <input type="text" placeholder="Usuário"
                        required>
                        <i class='bx bxs-user'></i>
                    </div>
                    <div class="input-box">
                        <input type="text" placeholder="Email"
                            required>
                        <i class='bx bxs-envelope'></i>
                    </div>
                     <div class="input-box">
                        <input type="password" placeholder="Senha"
                        required>
                       <i class='bx bxs-lock-alt'></i>
                    </div>
                    <button type="submit" class="btn">Registrar</button>
                    <p>ou registre-se com as plataformas sociais</p>
                    <div class="social-icons">
                        <!-- adicionei funcionalidade para os botões da tela de login. -->
                        <!-- Precisa estar no navegador, não no preview do VScode. -->
                        <a href="https://accounts.google.com" target="_blank"><i class='bx bxl-google' ></i></a>
                        <a href="https://www.facebook.com" target="_blank"><i class='bx bxl-facebook' ></i></a>
                        <a href="https://github.com/login" target="_blank"><i class='bx bxl-github' ></i></a>
                        <a href="https://www.linkedin.com/login" target="_blank"><i class='bx bxl-linkedin' ></i></a>
                    </div>  
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Bem-Vindo!</h1>
                <p>Não tem uma conta?</p>
                <button class="btn registerBtn">Registrar</button>
            </div>

             <div class="toggle-panel toggle-right">
                <h1>Bem-Vindo de Volta!</h1>
                <p>Já tem uma conta?</p>
                <button class="btn loginBtn">Login</button>
            </div>
        </div>
    </div>

    <!-- Caminho atualizado para a nova estrutura do projeto. -->
    <script src="../scripts/LoginScript.js"></script>
</body>

</html>
